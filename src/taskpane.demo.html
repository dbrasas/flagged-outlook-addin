<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="referrer" content="no-referrer"/>
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'none'; frame-src 'none'; form-action 'none'; upgrade-insecure-requests"
  />
  <title>Flagged by Due Date Demo</title>
  <link rel="stylesheet" href="./taskpane.generated.css?v=20260409-1"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="bg-[#f9fafb] font-['Inter',_sans-serif] text-gray-900 antialiased selection:bg-gray-200">
<div class="mx-auto flex min-h-screen max-w-[480px] flex-col bg-[#f4f4f5] shadow-2xl shadow-black/5 ring-1 ring-black/5 sm:my-8 sm:h-auto sm:min-h-0 sm:rounded-3xl sm:border sm:border-gray-200/50 sm:shadow-xl sm:ring-0" id="panelShell">
  <header class="sticky top-0 z-20 flex h-16 shrink-0 items-center justify-end border-b border-gray-200/60 bg-white/70 px-5 backdrop-blur-xl sm:rounded-t-3xl">
    <div class="flex items-center gap-2">
      <a
        class="flex h-9 w-9 items-center justify-center rounded-full border border-gray-200 bg-white text-gray-500 shadow-sm transition-all hover:border-gray-300 hover:bg-gray-50 hover:text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-200 focus:ring-offset-1"
        href="https://dbrasas.github.io/flagged-outlook-addin/src/taskpane.html"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Atidaryti puslapį"
        title="Atidaryti puslapį"
      >
        <svg viewBox="0 0 24 24" fill="none" class="h-4 w-4" aria-hidden="true">
          <path d="M14 5h5v5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M10 14 19 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M19 13v4a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>
      <button id="refreshBtn" class="group flex h-9 w-9 items-center justify-center rounded-full border border-gray-200 bg-white text-gray-500 shadow-sm transition-all hover:border-gray-300 hover:bg-gray-50 hover:text-gray-900 focus:outline-none focus:ring-2 focus:ring-gray-200 focus:ring-offset-1" type="button" aria-label="Perkrauti demo" title="Perkrauti demo">
        <svg viewBox="0 0 24 24" fill="none" class="h-4 w-4 transition-transform duration-300 group-[.spinning]:animate-spin group-hover:rotate-180" aria-hidden="true">
          <path d="M3 12a9 9 0 0 1 15.3-6.36L21 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M21 12a9 9 0 0 1-15.3 6.36L3 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </button>
    </div>
  </header>

  <main class="flex-1 space-y-6 p-5">
    <div id="errorBox" class="rounded-2xl border border-rose-200/60 bg-white p-4 shadow-sm text-sm leading-relaxed text-gray-600 block">
      Demo režimas: čia rodomi pavyzdiniai duomenys, kad galėtumėte įvertinti išdėstymą, spalvas ir kortelių tankį ne Outlook aplinkoje.
    </div>

    <section id="main-content" class="space-y-6 block">
      <div class="grid grid-cols-2 gap-3 w-full max-w-[282px]">
        <article class="flex flex-col gap-2 rounded-2xl border border-gray-200 bg-white p-3 transition-all hover:border-red-200 hover:bg-red-50/10">
          <div class="flex items-start">
            <span class="inline-flex rounded-full bg-red-50 px-2.5 py-0.5 text-[10px] font-semibold tracking-wide text-red-600 ring-1 ring-inset ring-red-600/10 uppercase">Vėluoja</span>
          </div>
          <div>
            <div class="font-['Inter'] text-[28px] leading-none font-medium text-[#0f172a]" id="countOverdue">1</div>
          </div>
        </article>

        <article class="flex flex-col gap-2 rounded-2xl border border-gray-200 bg-white p-3 transition-all hover:border-amber-200 hover:bg-amber-50/10">
          <div class="flex items-start">
            <span class="inline-flex rounded-full bg-amber-50 px-2.5 py-0.5 text-[10px] font-semibold tracking-wide text-amber-700 ring-1 ring-inset ring-amber-600/20 uppercase">Šiandien</span>
          </div>
          <div>
            <div class="font-['Inter'] text-[28px] leading-none font-medium text-[#0f172a]" id="countToday">2</div>
          </div>
        </article>

        <article class="flex flex-col gap-2 rounded-2xl border border-gray-200 bg-white p-3 transition-all hover:border-blue-200 hover:bg-blue-50/10">
          <div class="flex items-start">
            <span class="inline-flex rounded-full bg-blue-50 px-2.5 py-0.5 text-[10px] font-semibold tracking-wide text-blue-700 ring-1 ring-inset ring-blue-700/10 uppercase">Artimiausi</span>
          </div>
          <div>
            <div class="font-['Inter'] text-[28px] leading-none font-medium text-[#0f172a]" id="countSoon">2</div>
          </div>
        </article>

        <article class="flex flex-col gap-2 rounded-2xl border border-gray-200 bg-white p-3 transition-all hover:border-gray-300 hover:bg-gray-50/50">
          <div class="flex items-start">
            <span class="inline-flex rounded-full bg-gray-50 px-2.5 py-0.5 text-[10px] font-semibold tracking-wide text-gray-600 ring-1 ring-inset ring-gray-500/10 uppercase">Be datos</span>
          </div>
          <div>
            <div class="font-['Inter'] text-[28px] leading-none font-medium text-[#0f172a]" id="countNoDate">1</div>
          </div>
        </article>
      </div>

      <div id="mailListContainer" class="space-y-7 pt-2"></div>
    </section>
  </main>
</div>

<script src="./taskpane.demo.js?v=20260408-4"></script>
</body>
</html>
